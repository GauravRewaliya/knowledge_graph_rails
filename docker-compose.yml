version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    ports:
      - "97474:7474"
      - "97687:7687"
    volumes:
      - ./db_data/neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/password

